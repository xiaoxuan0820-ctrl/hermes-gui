<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes GUI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #252542;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --accent: #6366f1;
      --border: #2a2a40;
      --success: #22c55e;
      --error: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* 顶部栏 */
    .header {
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }
    .logo { font-size: 24px; }
    .title { font-size: 18px; font-weight: 600; }
    .status { 
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
    }
    .status-dot.connected { background: var(--success); }
    
    /* 聊天区域 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      display: flex;
      gap: 12px;
      max-width: 800px;
    }
    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .message.user .message-avatar { background: var(--accent); }
    .message.assistant .message-avatar { background: var(--success); }
    .message-content { flex: 1; }
    .message-author { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .message-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .welcome-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 20px;
    }
    .welcome-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .welcome-subtitle { color: var(--text-secondary); margin-bottom: 24px; }
    
    /* 输入区域 */
    .input-area {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }
    .input-container {
      display: flex;
      gap: 12px;
      max-width: 800px;
      margin: 0 auto;
    }
    .input-wrapper {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
    }
    .input-wrapper:focus-within { border-color: var(--accent); }
    .input-wrapper textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    .send-btn {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }
    .send-btn:hover { background: #818cf8; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🦌</span>
    <span class="title">Hermes GUI</span>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">未连接</span>
    </div>
  </div>
  
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🦌</div>
      <div class="welcome-title">欢迎使用 Hermes GUI</div>
      <div class="welcome-subtitle">Hermes Agent 桌面客户端，开始对话吧</div>
    </div>
  </div>
  
  <div class="input-area">
    <div class="input-container">
      <div class="input-wrapper">
        <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    let isChatting = false;
    let currentAssistantMsg = null;
    
    // 初始化
    async function init() {
      try {
        const result = await window.hermesAPI.checkHermes();
        updateStatus(result.installed ? 'installed' : 'not-installed');
      } catch (e) {
        updateStatus('not-installed');
      }
      
      window.hermesAPI.onChatOutput(handleOutput);
      window.hermesAPI.onChatError(handleError);
    }
    
    function updateStatus(status) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      
      if (status === 'connected') {
        dot.classList.add('connected');
        text.textContent = '已连接';
        isChatting = true;
      } else if (status === 'installed') {
        dot.classList.remove('connected');
        text.textContent = 'Hermes 已安装';
      } else {
        dot.classList.remove('connected');
        text.textContent = 'Hermes 未安装';
      }
    }
    
    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      
      // 隐藏欢迎
      document.getElementById('welcome').style.display = 'none';
      
      // 添加用户消息
      addMessage('user', text);
      input.value = '';
      
      // 如果还没开始对话
      if (!isChatting) {
        await window.hermesAPI.startChat();
        updateStatus('connected');
      }
      
      // 发送消息
      await window.hermesAPI.sendMessage(text);
    }
    
    function addMessage(role, content) {
      const chatArea = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.innerHTML = `
        <div class="message-avatar">${role === 'user' ? '👤' : '🦌'}</div>
        <div class="message-content">
          <div class="message-author">${role === 'user' ? '你' : 'Hermes'}</div>
          <div class="message-text">${escapeHtml(content)}</div>
        </div>
      `;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      
      if (role === 'assistant') {
        currentAssistantMsg = div.querySelector('.message-text');
      }
    }
    
    function handleOutput(data) {
      if (!currentAssistantMsg) {
        addMessage('assistant', '');
      }
      currentAssistantMsg.textContent += data;
      document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
    }
    
    function handleError(error) {
      addMessage('assistant', '[错误] ' + error);
    }
    
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    init();
  </script>
</body>
</html>
